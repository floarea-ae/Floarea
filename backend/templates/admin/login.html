<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Floarea Admin Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f6f3ee;
      color: #1a2e20;
      display: grid;
      place-items: center;
    }
    main {
      width: min(420px, calc(100% - 32px));
      background: #fff;
      border: 1px solid #e4ded4;
      padding: 32px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      font-weight: 500;
    }
    label {
      display: block;
      margin: 16px 0 6px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfc7bc;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 12px 16px;
      border: 0;
      background: #1a2e20;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    .error {
      margin: 0 0 16px;
      color: #9b1c1c;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Floarea Admin</h1>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="/admin/login">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit">Login</button>
    </form>
  </main>
</body>
</html>
